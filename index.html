<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waifu Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .header {
    text-align: center;
    padding: 12px;
    background: #16213e;
    border-bottom: 2px solid #e94560;
  }
  .header h1 { font-size: 1.3em; color: #e94560; }
  .state-label {
    font-size: 0.9em;
    color: #aaa;
    margin-top: 4px;
  }
  .state-label span { color: #e94560; font-weight: bold; }

  .waifu-selector {
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .waifu-selector label { font-size: 0.85em; color: #aaa; }
  .waifu-selector select {
    background: #1a1a2e;
    color: #eee;
    border: 1px solid #e94560;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 0.85em;
  }

  .display-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }

  video, .sprite-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: transform 0.1s ease;
    transform-origin: center center;
  }

  /* Full window mode */
  body.fullwindow .header,
  body.fullwindow .controls,
  body.fullwindow .tts-controls,
  body.fullwindow .speed-bar,
  body.fullwindow .debug-bar {
    display: none !important;
  }
  body.fullwindow .display-area {
    height: 100vh;
    width: 100vw;
    background: #000;
  }
  body.fullwindow video,
  body.fullwindow .sprite-img,
  body.fullwindow .sprite-sheet {
    max-width: 100vw;
    max-height: 100vh;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
  }

  .fullwindow-toggle {
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 999;
    padding: 6px 10px;
    border: 1px solid #e94560;
    background: rgba(26, 26, 46, 0.8);
    color: #eee;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9em;
    transition: all 0.15s;
    opacity: 0;
    pointer-events: none;
  }
  .fullwindow-toggle:hover { background: #e94560; }
  body.fullwindow .fullwindow-toggle {
    opacity: 0;
    pointer-events: auto;
  }
  body.fullwindow:hover .fullwindow-toggle {
    opacity: 1;
  }

  .sprite-img {
    image-rendering: pixelated;
  }

  .sprite-sheet {
    image-rendering: pixelated;
    background-repeat: no-repeat;
    background-size: 400% 300%;
    transition: transform 0.1s ease;
    transform-origin: center center;
  }

  .no-asset {
    color: #666;
    font-size: 1.2em;
    text-align: center;
    padding: 2em;
  }

  .controls {
    padding: 10px;
    background: #16213e;
    border-top: 2px solid #e94560;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .controls button {
    padding: 6px 14px;
    border: 1px solid #e94560;
    background: transparent;
    color: #eee;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8em;
    transition: all 0.15s;
  }
  .controls button:hover { background: #e94560; }
  .controls button.active {
    background: #e94560;
    color: #fff;
    font-weight: bold;
  }

  .tts-controls {
    padding: 8px 12px;
    background: #0f0f23;
    border-top: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .tts-controls button {
    padding: 5px 12px;
    border: 1px solid #6c5ce7;
    background: transparent;
    color: #a29bfe;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85em;
    transition: all 0.15s;
    min-width: 36px;
  }
  .tts-controls button:hover { background: #6c5ce7; color: #fff; }
  .tts-controls button:disabled { opacity: 0.3; cursor: default; }
  .tts-controls button:disabled:hover { background: transparent; color: #a29bfe; }
  .tts-chunk-info {
    font-size: 0.8em;
    color: #a29bfe;
    min-width: 80px;
    text-align: center;
  }
  .tts-chunk-text {
    font-size: 0.7em;
    color: #666;
    max-width: 300px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tts-bar { display: none; }
  .tts-bar.active { display: flex; }
  .speed-bar {
    padding: 4px 12px;
    background: #0f0f23;
    border-top: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tts-speed-control { display: flex; align-items: center; gap: 4px; }
  .tts-speed-control input[type=range] { cursor: pointer; }

  .debug-bar {
    padding: 6px 12px;
    background: #0f0f23;
    font-size: 0.75em;
    color: #555;
    text-align: center;
  }

  /* Chat Interface */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #0f0f23;
    border-top: 1px solid #333;
    min-height: 200px;
    max-height: 40vh;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #333;
  }

  .chat-header-title {
    font-size: 0.9em;
    color: #e94560;
    font-weight: bold;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chat-header-actions {
    display: flex;
    gap: 4px;
  }

  .chat-header-btn {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 0.9em;
    transition: all 0.15s;
  }

  .chat-header-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #e94560;
  }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chat-message {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 0.85em;
    line-height: 1.4;
  }

  .user-message {
    align-self: flex-end;
    background: #e94560;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .assistant-message {
    align-self: flex-start;
    background: #2d3a4a;
    color: #eee;
    border-bottom-left-radius: 4px;
  }

  .message-content {
    word-wrap: break-word;
  }

  .message-time {
    font-size: 0.7em;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-align: right;
  }

  .chat-viewer-info {
    padding: 20px;
    text-align: center;
    color: #666;
    font-size: 0.9em;
    border-top: 1px solid #333;
    background: #0f0f23;
  }

  /* Chat Sidebar */
  .chat-sidebar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 280px;
    height: 100%;
    background: #16213e;
    border-right: 1px solid #333;
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.2s ease, opacity 0.2s ease;
    z-index: 1000;
    display: flex;
    flex-direction: column;
  }

  .chat-sidebar.visible {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }

  .chat-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    background: #0f0f23;
    border-bottom: 1px solid #333;
  }

  .chat-sidebar-header-title {
    font-size: 1em;
    color: #e94560;
    font-weight: bold;
  }

  .chat-sidebar-header-actions {
    display: flex;
    gap: 4px;
  }

  .chat-sidebar-btn {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.9em;
    transition: all 0.15s;
  }

  .chat-sidebar-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #e94560;
  }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .chat-list-empty {
    color: #666;
    font-size: 0.85em;
    text-align: center;
    padding: 2em;
  }

  .chat-list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .chat-list-item:hover {
    background: rgba(255,255,255,0.05);
  }

  .chat-list-item.active {
    background: rgba(233, 69, 96, 0.2);
    border-left: 3px solid #e94560;
  }

  .chat-list-item-content {
    flex: 1;
    overflow: hidden;
  }

  .chat-list-item-name {
    font-size: 0.85em;
    color: #eee;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-list-item-meta {
    font-size: 0.7em;
    color: #666;
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }

  .chat-list-item-preview {
    font-size: 0.75em;
    color: #888;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-list-item-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .chat-list-item:hover .chat-list-item-actions {
    opacity: 1;
  }

  .chat-action-btn {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 0.8em;
    transition: all 0.15s;
  }

  .chat-action-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #e94560;
  }

  .chat-action-delete:hover {
    color: #ff4444;
  }

  /* Adjust layout for chat */
  body.chat-mode .display-area {
    max-height: 50vh;
  }

  body.chat-mode .controls,
  body.chat-mode .tts-controls,
  body.chat-mode .speed-bar {
    display: none;
  }

  body.fullwindow .chat-container,
  body.fullwindow .chat-sidebar {
    display: none !important;
  }

  /* Chat Loading/Error States */
  .chat-loading,
  .chat-error,
  .chat-empty {
    padding: 20px;
    text-align: center;
    color: #666;
    font-size: 0.9em;
  }

  .chat-error {
    color: #ff4444;
  }

  .chat-list-error {
    padding: 20px;
    text-align: center;
    color: #ff4444;
    font-size: 0.85em;
  }
</style>
</head>
<body>

<button class="fullwindow-toggle" onclick="toggleFullWindow()" title="Exit full window (f / Esc)">✕</button>

<div class="header">
  <h1>Waifu Display</h1>
  <div class="state-label">State: <span id="stateText">idle</span> <span id="emotionText"></span></div>
  <div class="waifu-selector">
    <label>Waifu:</label>
    <select id="waifuSelect"><option>loading...</option></select>
    <button onclick="toggleChatMode()" style="margin-left:8px;padding:4px 8px;border:1px solid #e94560;background:transparent;color:#eee;border-radius:4px;cursor:pointer;font-size:0.8em" title="Toggle Chat Mode">💬</button>
  </div>
</div>

<div class="display-area" id="displayArea">
  <div class="no-asset" id="placeholder">Loading...</div>
</div>

<!-- Chat Viewer (Read-Only) -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <button class="chat-header-btn" type="button" data-action="toggle-chat-sidebar" title="Chat History">☰</button>
    <span class="chat-header-title" id="chatTitle">Chat History</span>
    <div class="chat-header-actions">
      <button class="chat-header-btn" id="copySessionIdBtn" type="button" onclick="copySessionId()" title="Copy Session ID" style="display:none">📋</button>
      <button class="chat-header-btn" type="button" onclick="refreshSessions()" title="Refresh">🔄</button>
    </div>
  </div>
  <div class="chat-history" id="chatHistory"></div>
  <div class="chat-viewer-info" id="chatViewerInfo">
    <span>Select a chat from the sidebar to view history</span>
  </div>
</div>

<!-- Chat Sidebar -->
<div id="chatSidebar" class="chat-sidebar">
  <div class="chat-sidebar-header">
    <span class="chat-sidebar-header-title">Chat History</span>
    <div class="chat-sidebar-header-actions">
      <button class="chat-sidebar-btn" type="button" data-action="export-all-chats" title="Export All Chats">⬇</button>
      <button class="chat-sidebar-btn" type="button" data-action="toggle-chat-sidebar" title="Close">✕</button>
    </div>
  </div>
  <div id="chatList" class="chat-list"></div>
</div>



<div class="controls">
  <button id="manualToggle" onclick="toggleManual()" style="padding:6px 14px;border:1px solid #e94560;background:#e94560;color:#fff;border-radius:4px;cursor:pointer;font-size:0.9em;min-width:40px">⏸</button>
  <button onclick="toggleFullWindow()" style="padding:6px 14px;border:1px solid #e94560;background:transparent;color:#eee;border-radius:4px;cursor:pointer;font-size:0.9em" title="Full window (f)">⛶</button>
  <div id="controls" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center"></div>
</div>
<div class="controls" style="border-top:none;padding-top:4px;">
  <div id="emotionControls" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center"></div>
</div>
<div class="tts-controls tts-bar" id="ttsBar">
  <button id="ttsSkipBack" onclick="ttsSkip('back')" disabled title="Skip back">⏮</button>
  <button id="ttsClear" onclick="ttsClear()" title="Stop TTS">⏹</button>
  <button id="ttsSkipForward" onclick="ttsSkip('forward')" disabled title="Skip forward">⏭</button>
  <span class="tts-chunk-info" id="ttsChunkInfo">—</span>
  <span class="tts-chunk-text" id="ttsChunkText"></span>
</div>
<div class="speed-bar" id="speedBar">
  <span class="tts-speed-control">
    <label style="font-size:0.75em;color:#a29bfe;margin-right:2px">⚡ Speed</label>
    <input type="range" id="ttsSpeed" min="0.5" max="2.0" step="0.1" value="1.0"
           style="width:60px;accent-color:#6c5ce7;vertical-align:middle"
           oninput="ttsSetSpeed(this.value)" title="Speech speed" />
    <span id="ttsSpeedValue" style="font-size:0.75em;color:#a29bfe;min-width:30px;display:inline-block">1.0x</span>
  </span>
</div>
<div class="debug-bar" id="debugBar">polling...</div>

<script>
const STATES = [
  'idle', 'listening', 'speaking', 'thinking',
  'typing', 'searching', 'calculating', 'fixing',
  'success', 'error', 'alert', 'sleeping'
];

const EMOTION_NAMES = {
  'e1': '♡ happy', 'e2': '✿ amused', 'e3': 'ʚ empathetic', 'e4': '? curious',
  'e5': '~ confused', 'e6': '! surprised', 'e7': '/// embarrassed', 'e8': '★ confident',
  'e9': '> annoyed', 'e10': '* overwhelmed', 'e11': '⚡ determined', 'e12': '♥ affectionate'
};

let currentState = '';
let currentEmotion = '';
let currentSet = '';
let sets = [];
let usingVideo = false;
let lastVideoAsset = null;
let manualMode = false;
let lastServerState = '';
let lastServerEmotion = '';

const displayArea = document.getElementById('displayArea');
const stateText = document.getElementById('stateText');
const controlsDiv = document.getElementById('controls');
const emotionControlsDiv = document.getElementById('emotionControls');
const debugBar = document.getElementById('debugBar');
const waifuSelect = document.getElementById('waifuSelect');

let videoEl = document.createElement('video');
videoEl.autoplay = true;
videoEl.loop = true;
videoEl.muted = true;
videoEl.playsInline = true;
videoEl.style.display = 'none';
displayArea.appendChild(videoEl);

let imgEl = document.createElement('img');
imgEl.className = 'sprite-img';
imgEl.style.display = 'none';
displayArea.appendChild(imgEl);

// Spritesheet container - uses CSS sprites to show one frame from a grid
let sheetEl = document.createElement('div');
sheetEl.className = 'sprite-sheet';
sheetEl.style.display = 'none';
displayArea.appendChild(sheetEl);

// Build control buttons
STATES.forEach(s => {
  const btn = document.createElement('button');
  btn.textContent = s;
  btn.dataset.state = s;
  btn.addEventListener('click', () => setState(s));
  controlsDiv.appendChild(btn);
});

// Build emotion buttons
Object.keys(EMOTION_NAMES).forEach(e => {
  const btn = document.createElement('button');
  btn.textContent = EMOTION_NAMES[e];
  btn.dataset.emotion = e;
  btn.style.borderColor = '#ff69b4';
  btn.addEventListener('click', () => setEmotion(e));
  emotionControlsDiv.appendChild(btn);
});

function updateControls() {
  controlsDiv.querySelectorAll('button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.state === currentState);
  });
  emotionControlsDiv.querySelectorAll('button').forEach(btn => {
    const isActive = btn.dataset.emotion === currentEmotion;
    btn.classList.toggle('active', isActive);
    if (isActive) {
      btn.style.background = '#ff69b4';
      btn.style.color = '#fff';
    } else {
      btn.style.background = 'transparent';
      btn.style.color = '#eee';
    }
  });
}

function toggleManual() {
  manualMode = !manualMode;
  const btn = document.getElementById('manualToggle');
  btn.textContent = manualMode ? '▶' : '⏸';
  btn.style.background = manualMode ? '#333' : '#e94560';
  if (!manualMode && lastServerState) {
    setState(lastServerState, true);
  } else if (manualMode) {
    fetchAsset(); // refresh to drop emotion visually if needed
  }
}

function setState(state, force = false, prefetchedData = null) {
  if (!force && state === currentState && currentSet) return;
  currentState = state;
  stateText.textContent = state + (manualMode ? ' [manual]' : '');
  updateControls();
  fetchAsset(prefetchedData);
}

function setEmotion(emotion) {
  currentEmotion = emotion;
  if (manualMode) {
    currentState = emotion;
  }
  stateText.textContent = currentState + (manualMode ? ' [manual]' : '');
  updateEmotionLabel();
  updateControls();
  fetchAsset();
}

waifuSelect.addEventListener('change', () => {
  currentSet = waifuSelect.value;
  localStorage.setItem('waifu_set', currentSet);
  fetchAsset();
});

function showDisplay(mode) {
  videoEl.style.display = mode === 'video' ? 'block' : 'none';
  imgEl.style.display = mode === 'image' ? 'block' : 'none';
  sheetEl.style.display = mode === 'sheet' ? 'block' : 'none';
  document.getElementById('placeholder').style.display = mode === 'none' ? 'block' : 'none';
  if (mode !== 'video') videoEl.pause();
}

function stateToGridPos(state) {
  let idx = STATES.indexOf(state);
  if (idx === -1 && typeof state === 'string' && state.match(/^e\d+$/)) {
    idx = parseInt(state.substring(1), 10) - 1;
  }
  if (idx === -1) idx = 0;
  return { col: idx % 4, row: Math.floor(idx / 4) };
}

function updateEmotionLabel() {
  const el = document.getElementById('emotionText');
  if (currentEmotion) {
    const name = EMOTION_NAMES[currentEmotion] || currentEmotion;
    el.textContent = ` | ${name}`;
  } else {
    el.textContent = '';
  }
}

async function fetchAsset(prefetchedData = null) {
  if (!currentSet) return;

  try {
    const data = prefetchedData || await (await fetch(`/current_state`)).json();
    currentEmotion = data.emotion || '';
    updateEmotionLabel();

    const setInfo = sets.find(s => s.name === currentSet);
    const isSpritesheet = setInfo && setInfo.type === 'spritesheet';

    // Check for MP4 first
    if (data.videoAsset) {
      showDisplay('video');
      if (data.videoAsset !== lastVideoAsset) {
        lastVideoAsset = data.videoAsset;
        videoEl.pause();
        videoEl.src = data.videoAsset;
        videoEl.load();
        videoEl.play().catch(() => {});
      }
      usingVideo = true;
      return;
    }

    if (isSpritesheet) {
      // Spritesheet mode: load image, crop with CSS background-position
      const displayState = manualMode ? currentState : (currentEmotion || currentState);
      const imgUrl = `/asset?set=${encodeURIComponent(currentSet)}&state=${displayState}&t=${Date.now()}`;
      const { col, row } = stateToGridPos(displayState);

      showDisplay('sheet');
      sheetEl.style.width = '100%';
      sheetEl.style.height = '100%';
      sheetEl.style.backgroundImage = `url(${imgUrl})`;
      sheetEl.style.backgroundPosition = `${(col / 3) * 100}% ${(row / 2) * 100}%`;
      usingVideo = false;
    } else {
      // Directory mode: prefer emotion frame, fall back to action frame
      // Build URL client-side so it uses the selected set, not server default
      const displayState = manualMode ? currentState : (currentEmotion || currentState);
      const imgUrl = `/asset?set=${encodeURIComponent(currentSet)}&state=${displayState}&t=${Date.now()}`;
      showDisplay('image');
      imgEl.src = imgUrl;
      usingVideo = false;
    }
  } catch (e) {
    showDisplay('none');
    document.getElementById('placeholder').textContent = `Error: ${e.message}`;
  }
}

// Poll server for state + set changes
async function poll() {
  try {
    const res = await fetch('/current_state');
    const data = await res.json();

    // Update sets list
    if (data.sets && JSON.stringify(data.sets) !== JSON.stringify(sets)) {
      sets = data.sets;
      waifuSelect.innerHTML = '';
      sets.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = `${s.name} (${s.type})`;
        waifuSelect.appendChild(opt);
      });
      if (!currentSet && sets.length > 0) {
        const saved = localStorage.getItem('waifu_set');
        currentSet = (saved && sets.find(s => s.name === saved)) ? saved : sets[0].name;
        waifuSelect.value = currentSet;
      }
    }

    // Detect state or emotion changes
    if (data.state !== lastServerState || data.emotion !== lastServerEmotion) {
      const forceUpdate = (data.emotion !== lastServerEmotion);
      lastServerState = data.state;
      lastServerEmotion = data.emotion || '';
      if (!manualMode) {
        currentEmotion = data.emotion || '';
        setState(data.state, forceUpdate, data);
      }
      // Report actual displayed state to server for tracking
      const displayLabel = currentEmotion
        ? (EMOTION_NAMES[currentEmotion] || currentEmotion)
        : currentState;
      fetch('/display_track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display: displayLabel, set: currentSet }),
      }).catch(() => {});
    }

    debugBar.textContent = `polling OK | ${sets.length} sets | ${usingVideo ? 'video' : 'image'} | ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    debugBar.textContent = `poll error: ${e.message}`;
  }
}

// ── TTS Controls ─────────────────────────────────────────────────────────────
const ttsBar = document.getElementById('ttsBar');
const ttsSkipBack = document.getElementById('ttsSkipBack');
const ttsSkipForward = document.getElementById('ttsSkipForward');
const ttsChunkInfo = document.getElementById('ttsChunkInfo');
const ttsChunkText = document.getElementById('ttsChunkText');

let ttsPollInterval = 2000; // poll every 2s when idle
let ttsPollTimer = null;

async function pollTTS() {
  try {
    const res = await fetch('/tts/status');
    const data = await res.json();

    if (data.error) {
      ttsBar.classList.remove('active');
      scheduleTTS(2000);
      return;
    }

    const isActive = data.playing || data.queue_size > 0;
    ttsBar.classList.toggle('active', isActive);

    // Poll faster when active, slower when idle
    const nextInterval = isActive ? 500 : 2000;

    if (isActive) {
      const cur = (data.batch_current ?? -1) + 1; // 1-indexed display
      const total = data.batch_total ?? 0;
      ttsChunkInfo.textContent = total > 0 ? `${cur}/${total}` : '...';
      ttsSkipBack.disabled = cur <= 1;
      ttsSkipForward.disabled = cur >= total && !data.playing;

      if (data.current_text) {
        ttsChunkText.textContent = data.current_text;
        ttsChunkText.title = data.current_text;
      } else {
        ttsChunkText.textContent = '';
      }
    }
    scheduleTTS(nextInterval);
  } catch {
    ttsBar.classList.remove('active');
    scheduleTTS(2000);
  }
}

function scheduleTTS(ms) {
  clearTimeout(ttsPollTimer);
  ttsPollTimer = setTimeout(pollTTS, ms);
}

async function ttsSkip(direction) {
  try {
    await fetch('/tts/skip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ direction }),
    });
    // Poll immediately for UI update
    scheduleTTS(100);
  } catch (e) {
    console.error('TTS skip error:', e);
  }
}

async function ttsClear() {
  try {
    await fetch('/tts/clear', { method: 'POST' });
    scheduleTTS(100);
  } catch (e) {
    console.error('TTS clear error:', e);
  }
}

async function ttsSetSpeed(val) {
  const speed = parseFloat(val);
  document.getElementById('ttsSpeedValue').textContent = speed.toFixed(1) + 'x';
  try { localStorage.setItem('ttsSpeed', speed.toString()); } catch {}
  try {
    await fetch('/tts/speed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ speed }),
    });
  } catch (e) {
    console.error('TTS speed error:', e);
  }
}

// Load saved speed on startup, push to server
(async function loadTtsSpeed() {
  let speed = 1.0;
  try {
    const saved = parseFloat(localStorage.getItem('ttsSpeed'));
    if (!isNaN(saved) && saved >= 0.5 && saved <= 2.0) speed = saved;
  } catch {}
  document.getElementById('ttsSpeed').value = speed;
  document.getElementById('ttsSpeedValue').textContent = speed.toFixed(1) + 'x';
  try {
    await fetch('/tts/speed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ speed }),
    });
  } catch {}
})();

// ── Full Window Toggle ─────────────────────────────────────────────────────
function toggleFullWindow() {
  document.body.classList.toggle('fullwindow');
}

// ── Zoom & Pan ─────────────────────────────────────────────────────────────
let zoomLevel = 1.0;
let panX = 0, panY = 0;
const ZOOM_MIN = 0.25;
const ZOOM_MAX = 4.0;
const ZOOM_STEP = 0.15;

function applyTransform() {
  const t = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
  videoEl.style.transform = t;
  imgEl.style.transform = t;
  sheetEl.style.transform = t;
  debugBar.textContent += ` | zoom ${Math.round(zoomLevel * 100)}%`;
}

function zoomIn() {
  zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP);
  applyTransform();
}

function zoomOut() {
  zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP);
  applyTransform();
}

function resetView() {
  zoomLevel = 1.0;
  panX = 0;
  panY = 0;
  applyTransform();
}

// Scroll wheel zoom on display area
displayArea.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY < 0) zoomIn();
  else zoomOut();
}, { passive: false });

// Click and drag to pan
let isPanning = false;
let panStartX = 0, panStartY = 0;
let panStartPanX = 0, panStartPanY = 0;

displayArea.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panStartPanX = panX;
  panStartPanY = panY;
  displayArea.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const scale = 1 / zoomLevel; // inverse so panning feels natural at any zoom
  panX = panStartPanX + (e.clientX - panStartX) * scale;
  panY = panStartPanY + (e.clientY - panStartY) * scale;
  applyTransform();
});

document.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    displayArea.style.cursor = '';
  }
});

// 'f' hotkey for full window toggle (ignore when typing in inputs)
document.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

  if (e.key === 'f') {
    e.preventDefault();
    toggleFullWindow();
  }
  if (e.key === 'Escape' && document.body.classList.contains('fullwindow')) {
    document.body.classList.remove('fullwindow');
  }
  if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
  if (e.key === '-') { e.preventDefault(); zoomOut(); }
  if (e.key === '0') { e.preventDefault(); resetView(); }
});

// Poll TTS status alongside sprite state
setInterval(poll, 1000);
poll();
pollTTS(); // self-scheduling via scheduleTTS()

// Initialize chat browser
document.addEventListener('DOMContentLoaded', () => {
  // Restore sidebar visibility
  if (localStorage.getItem('waifuChatSidebarVisible') === 'true') {
    var sidebar = document.getElementById('chatSidebar');
    if (sidebar) sidebar.classList.add('visible');
  }

  // Restore chat mode
  if (localStorage.getItem('waifuChatMode') === 'true') {
    document.body.classList.add('chat-mode');
  }
});

function toggleChatMode() {
  document.body.classList.toggle('chat-mode');
  var isChatMode = document.body.classList.contains('chat-mode');
  localStorage.setItem('waifuChatMode', isChatMode.toString());
  
  // Resize display area when toggling chat mode
  if (typeof resizeCanvas === 'function') {
    setTimeout(resizeCanvas, 100);
  }
}

function copySessionId() {
  if (window.ChatBrowser && window.ChatBrowser.currentSessionId) {
    navigator.clipboard.writeText(window.ChatBrowser.currentSessionId).then(() => {
      // Visual feedback
      const btn = document.getElementById('copySessionIdBtn');
      const originalText = btn.textContent;
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = originalText; }, 1000);
    }).catch(err => {
      console.error('Failed to copy:', err);
    });
  }
}
